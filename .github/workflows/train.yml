name: train-delay-risk-model

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 1 * *"

concurrency:
  group: delay-risk-pipeline
  cancel-in-progress: true

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch weather data
        run: python src/fetch_training_data.py

      - name: Build features
        run: python src/build_features.py

      - name: Train model
        run: python src/train.py

      - name: Predict latest appointments
        run: python src/predict.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: delay-risk-artifacts
          path: |
            models/
            reports/
            data/processed/